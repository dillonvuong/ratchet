name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    name: build + test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          check-latest: true

      - name: Verify modules
        run: go mod download

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build -v ./...

      - name: go test
        run: go test -v -race ./...

      - name: Build release binary
        run: go build -o maxwell ./cmd/maxwell

      - name: Sanity check
        run: |
          ./maxwell version
          ./maxwell help

  self-host:
    name: maxwell runs maxwell
    runs-on: ubuntu-latest
    needs: build-test
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          check-latest: true

      - name: Build maxwell
        run: go build -o maxwell ./cmd/maxwell

      - name: Make gate scripts executable
        run: chmod +x skills/tdd-red-green-refactor/scripts/*.sh

      # The self-host check runs the TDD gate against the most recent commit.
      # On the initial commit there is no prior diff, so the gate is allowed
      # to no-op (no prod-code changes detected → status=pass).
      - name: Run TDD gate against HEAD
        run: |
          ./maxwell gate --name=tdd-red-green-refactor --task=ci-${{ github.sha }} || verdict=$?
          echo "maxwell exit code: ${verdict:-0}"

  conformance:
    name: conformance report
    runs-on: ubuntu-latest
    needs: build-test
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run all tests with coverage
        run: go test -coverprofile=coverage.out ./...

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1
